<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Railway Ticket System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            margin: 0;
            padding: 0;
            color: white;
        }

        header {
            background: #002244;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container {
            background: white;
            color: black;
            width: 420px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.4);
        }

        h3 {
            text-align: center;
            color: #002244;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #ff6600;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #e65c00;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f2f2f2;
            margin: 8px 0;
            padding: 12px;
            border-left: 5px solid #002244;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    🚆 Indian Railway Ticket System
</header>

<div class="container">
    <h3>Book Ticket</h3>
    <input type="text" id="name" placeholder="Passenger Name">
    <input type="text" id="destination" placeholder="Destination">
    <button onclick="addTicket()">Book Ticket</button>

    <h3>Ticket List</h3>
    <ul id="ticketList"></ul>
</div>

<script>
    function addTicket() {
        let name = document.getElementById("name").value;
        let destination = document.getElementById("destination").value;

        if (name === "" || destination === "") {
            alert("Please fill all details");
            return;
        }

        let list = document.getElementById("ticketList");

        let item = document.createElement("li");

        item.innerHTML = name + " → " + destination +
            " <button class='delete-btn' onclick='deleteTicket(this)'>Cancel</button>";

        list.appendChild(item);

        document.getElementById("name").value = "";
        document.getElementById("destination").value = "";
    }

    function deleteTicket(btn) {
        btn.parentElement.remove();
    }
</script>

</body>
</html>
